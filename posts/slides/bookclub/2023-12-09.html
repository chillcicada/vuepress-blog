    <div id="app"><!--[--><div class="vp-reveal-page"><div><!-- # Summary

- 学习异化与劳动异化
  - 相似点：
    - 外在表现相同
    - 都表现为对人的主体性的迫害
  - 不同点：
    - 劳动异化理论本身是可以用马克思理论解释的，同时也是马克思主义理论的一部分
    - 学习异化则是一种社会现象，本身夹杂着多种因素
    - 二者只有形式和发生学上的共性，其本质是需要做区分的

- 学习异化：
  - “过度教育”——社会压力
  - 同质化教育与教育过度功利化——教育制度缺陷
  - 学习者自身的学习主动性的丧失（既是学习异化的结果，也是学习异化的推动力）

- 不幸的是，正如我们没法在当下社会消除资本，我们也无法在当下社会消除异化。即使作为更主体性的人，我们依然也无法完全摆脱。 --><!-- markdownlint-disable MD024 MD033 MD051 --><div class="vp-reveal"><div class="reveal reveal-viewport"><div class="slides"><section data-markdown><script type="text/template"></script></section></div></div><div class="loading-icon-wrapper reveal-loading" style="display:flex;align-items:center;justify-content:center;height:400px;"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" preserveAspectRatio="xMidYMid" viewBox="25 25 50 50"><animateTransform attributeName="transform" type="rotate" dur="2s" keyTimes="0;1" repeatCount="indefinite" values="0;360"></animateTransform><circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><animate attributeName="stroke-dasharray" dur="1.5s" keyTimes="0;0.5;1" repeatCount="indefinite" values="1,200;90,200;1,200"></animate><animate attributeName="stroke-dashoffset" dur="1.5s" keyTimes="0;0.5;1" repeatCount="indefinite" values="0;-35px;-125px"></animate></circle></svg></div></div></div><div class="vp-reveal-menu"><button type="button" class="menu-button"><span class="icon"></span></button><button type="button" class="back-button"><svg xmlns="http://www.w3.org/2000/svg" class="icon back-icon" viewBox="0 0 1024 1024" fill="currentColor" aria-label="back icon"><path d="M1014.749 449.156v125.688H260.626l345.64 345.64-89.239 89.237L19.307 512l497.72-497.721 89.238 89.238-345.64 345.64h754.124z"></path></svg></button><button type="button" class="home-button"><svg xmlns="http://www.w3.org/2000/svg" class="icon home-icon" viewBox="0 0 1024 1024" fill="currentColor" aria-label="home icon"><path d="M780.106 420.978L506.994 147.866 233.882 420.978h.045v455.11H780.06v-455.11h.046zm90.977 90.976V876.09a91.022 91.022 0 01-91.023 91.022H233.927a91.022 91.022 0 01-91.022-91.022V511.954l-67.22 67.175-64.307-64.307 431.309-431.31c35.498-35.498 93.115-35.498 128.614 0l431.309 431.31-64.307 64.307L871.083 512z"></path></svg><
